<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nicat Tech Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
input, button { padding:10px; margin:5px; }
.card { background:#1e293b; padding:10px; margin:10px; border-radius:8px; display:inline-block; width:200px;}
</style>
</head>

<body>

<h1>🔐 Admin Panel</h1>

<div id="loginBox">
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>➕ Məhsul əlavə et</h2>

  <input id="name" placeholder="Məhsul adı"><br>
  <input id="price" placeholder="Qiymət"><br>
  <input id="image" placeholder="Şəkil URL"><br>

  <button onclick="addProduct()">Əlavə et</button>

  <h2>🛒 Məhsullar</h2>
  <div id="products"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCPprPO6t7tUiyfD6LCeTLNRx2LIjiDEwE",
  authDomain: "nicat-tech.firebaseapp.com",
  projectId: "nicat-tech",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// LOGIN
function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("panel").style.display = "block";
      loadProducts();
    })
    .catch(err => alert(err.message));
}

// ADD PRODUCT
function addProduct() {
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let image = document.getElementById("image").value;

  db.collection("products").add({
    name,
    price,
    image
  });

  alert("Əlavə edildi!");
}

// LOAD PRODUCTS
function loadProducts() {
  db.collection("products").onSnapshot(snapshot => {
    let html = "";
    snapshot.forEach(doc => {
      let p = doc.data();
      html += `
        <div class="card">
          <img src="${p.image}" width="100%">
          <h3>${p.name}</h3>
          <p>${p.price} AZN</p>
        </div>
      `;
    });
    document.getElementById("products").innerHTML = html;
  });
}
</script>

</body>
</html>
