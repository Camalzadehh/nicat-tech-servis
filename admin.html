<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

input, button {
  padding:10px;
  margin:5px;
  border-radius:5px;
  border:none;
}

button {
  background:#38bdf8;
  cursor:pointer;
}

.card {
  background:#1e293b;
  padding:10px;
  margin:10px;
  border-radius:10px;
  display:inline-block;
}
img {
  width:100px;
}
</style>
</head>

<body>

<h1>🔐 Admin Panel</h1>

<div id="loginDiv">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

  <h2>➕ Məhsul əlavə et</h2>

  <input id="name" placeholder="Ad"><br>
  <input id="price" placeholder="Qiymət"><br>
  <input type="file" id="image"><br>

  <button onclick="addProduct()">Əlavə et</button>

  <h2>📦 Məhsullar</h2>
  <div id="products"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCPprPO6t7uD6LCeTLNRx2LIjiDEwE",
  authDomain: "nicat-tech.firebaseapp.com",
  projectId: "nicat-tech",
  storageBucket: "nicat-tech.appspot.com",
  messagingSenderId: "367189445591",
  appId: "1:367189445591:web:02c96c06dff4c806ae9992"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* LOGIN */
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(()=>{
      document.getElementById("loginDiv").style.display="none";
      document.getElementById("panel").style.display="block";
      loadProducts();
    })
    .catch(e=>alert(e.message));
}

/* ADD PRODUCT */
function addProduct() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const file = document.getElementById("image").files[0];

  const upload = storage.ref("images/" + file.name).put(file);

  upload.on("state_changed", null, null, ()=>{
    upload.snapshot.ref.getDownloadURL().then(url=>{
      db.collection("products").add({
        name:name,
        price:price,
        image:url
      });
      alert("Əlavə olundu");
    });
  });
}

/* LOAD PRODUCTS */
function loadProducts(){
  db.collection("products").onSnapshot(snapshot=>{
    let html="";
    snapshot.forEach(doc=>{
      let p = doc.data();

      html += `
        <div class="card">
          <img src="${p.image}">
          <h3>${p.name}</h3>
          <p>${p.price} AZN</p>
          <button onclick="deleteProduct('${doc.id}')">Sil</button>
        </div>
      `;
    });
    document.getElementById("products").innerHTML = html;
  });
}

/* DELETE */
function deleteProduct(id){
  db.collection("products").doc(id).delete();
}
</script>

</body>
</html>
